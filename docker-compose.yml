services:
    qms-app:
        build:
            context: .
            dockerfile: Dockerfile
        image: heruvim6w/qms-api
        container_name: qms-api
        restart: unless-stopped
        working_dir: /var/www/html
        volumes:
            - .:/var/www/html
            - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
            - ./docker/nginx/default.conf:/etc/nginx/http.d/default.conf
            - ./docker/supervisor/supervisord.conf:/etc/supervisord.conf
        ports:
            - "8000:8000"
            - "8080:8080"
        env_file:
            - .env
        networks:
            - qms-network
        depends_on:
            - qms-db
            - qms-redis
            - qms-mailpit

    qms-db:
        image: postgres:15-alpine
        container_name: qms-db
        restart: unless-stopped
        env_file:
            - .env
        environment:
            POSTGRES_DB: ${DB_DATABASE}
            POSTGRES_USER: ${DB_USERNAME}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
        ports:
            - "5432:5432"
        volumes:
            - qms_postgres_data:/var/lib/postgresql/data
        networks:
            - qms-network

    qms-redis:
        image: redis:7-alpine
        container_name: qms-redis
        restart: unless-stopped
        ports:
            - "6379:6379"
        volumes:
            - qms_redis_data:/data
        networks:
            - qms-network

    qms-mailpit:
        image: axllent/mailpit:latest
        container_name: qms-mailpit
        restart: unless-stopped
        ports:
            - "8025:8025"   # Web UI — открывай http://localhost:8025
            - "1025:1025"   # SMTP порт
        networks:
            - qms-network

volumes:
    qms_postgres_data:
        driver: local
    qms_redis_data:
        driver: local

networks:
    qms-network:
        driver: bridge
        external: true
